<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Django Blog</title>
    <!-- On importe Bootstrap (CSS) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Barre de navigation -->
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'liste_articles' %}">🚀 Mon Mini Blog</a>
            <a class="btn btn-outline-light" href="{% url 'nouvel_article' %}">+ Nouvel Article</a>
        </div>
    </nav>

    <!-- Zone de contenu dynamique -->
    <div class="container">
        {% block content %}
        <!-- Le contenu des autres pages ira ici -->
        {% endblock %}
    </div>

    <!-- Pied de page -->
    <footer class="text-center mt-5 py-4 border-top">
        <p>&copy; 2024 - Créé avec Django 💖</p>
    </footer>

</body>
</html>
