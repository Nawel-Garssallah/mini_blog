{% extends 'blog/base.html' %}

{% block content %}
    <div class="bg-white p-5 rounded shadow-sm">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'liste_articles' %}">Accueil</a></li>
                <li class="breadcrumb-item active" aria-current="page">{{ article.titre }}</li>
            </ol>
        </nav>

        <h1 class="display-4">{{ article.titre }}</h1>
        <p class="text-muted">Publié le {{ article.date_publication|date:"d F Y à H:i" }}</p>
        <hr>
        
        <div class="lead" style="white-space: pre-wrap;">
            {{ article.contenu }}
        </div>

        <div class="mt-5">
            <a href="{% url 'liste_articles' %}" class="btn btn-secondary">&larr; Retour à la liste</a>
        </div>
    </div>
{% endblock %}
